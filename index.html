<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Training">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Training</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #F0F0F0;
            --text-dark: #000000;
            --text-light: #A0A0A0;
            --modal-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: calc(30px + env(safe-area-inset-top)) 20px 140px 20px;
            overscroll-behavior-y: none;
        }

        /* HEADER */
        .header {
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .main-title {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            line-height: 1;
        }

        .arrow {
            font-size: 20px;
            font-weight: 700;
            transform: translateY(2px);
            transition: transform 0.2s;
        }

        .header.open .arrow {
            transform: translateY(2px) rotate(180deg);
        }

        .sub-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-light);
            margin: 0;
            letter-spacing: -1px;
            line-height: 1;
        }

        /* DROPDOWN */
        .dropdown {
            position: absolute;
            top: 80px;
            left: -10px;
            background: #fff;
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            z-index: 20;
            min-width: 240px;
        }

        .dropdown.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 15px 20px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background: var(--bg);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 15px;
            margin-top: 20px;
        }

        .exercise-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .circle {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: 900;
            color: #000;
            cursor: pointer;
            transition: transform 0.15s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .circle:active {
            transform: scale(0.9);
        }

        .ex-name {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
            max-width: 100px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-light);
            margin-top: -4px;
            transition: background 0.2s;
        }
        
        .status-dot.filled {
            background: #000;
        }

        /* BOTTOM BAR */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            padding-bottom: calc(30px + env(safe-area-inset-bottom));
            background: transparent;
            display: flex;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        .save-btn {
            pointer-events: auto;
            width: 100%;
            max-width: 340px;
            height: 60px;
            border-radius: 14px;
            background: #000;
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, background 0.2s;
            text-transform: uppercase;
        }

        .save-btn:active {
            transform: scale(0.98);
            background: #222;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--modal-bg);
            width: 100%;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 30px 20px 50px 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .modal-target {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-light);
            margin-top: 5px;
        }

        .close-btn {
            background: #f0f0f0;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 800;
            color: var(--text-light);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .brutal-input {
            width: 100%;
            border: none;
            border-bottom: 4px solid #E0E0E0;
            background: transparent;
            font-size: 40px;
            font-weight: 900;
            color: #000;
            padding: 5px 0;
            border-radius: 0;
            appearance: textfield;
            transition: border-color 0.2s;
        }

        .brutal-input:focus {
            outline: none;
            border-color: #000;
        }
        
        .brutal-input::-webkit-outer-spin-button,
        .brutal-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .done-btn {
            width: 100%;
            background: #000;
            color: #fff;
            border: none;
            padding: 20px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 12px;
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s;
        }
        .done-btn:active {
            transform: scale(0.98);
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: calc(110px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(200px);
            background: #000;
            color: #fff;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

    </style>
</head>
<body>

    <div class="header" id="headerWrapper">
        <h1 class="main-title" onclick="toggleDropdown()">
            <span id="activeDayText">Laden...</span>
            <span class="arrow">▼</span>
        </h1>
        <h2 class="sub-title">Workout</h2>

        <div class="dropdown" id="dropdown">
            <div class="dropdown-item" onclick="selectDay('ok_a', 'Oberkörper A')">Oberkörper A</div>
            <div class="dropdown-item" onclick="selectDay('uk_a', 'Unterkörper A')">Unterkörper A</div>
            <div class="dropdown-item" onclick="selectDay('ok_b', 'Oberkörper B')">Oberkörper B</div>
            <div class="dropdown-item" onclick="selectDay('uk_b', 'Unterkörper B')">Unterkörper B</div>
            <div style="height: 1px; background: #EEE; margin: 5px 15px;"></div>
            <div class="dropdown-item" onclick="exportHistory()" style="color: #2BC47E;">Historie exportieren</div>
        </div>
    </div>

    <div class="grid" id="grid">
        <!-- Circles will be rendered here -->
    </div>

    <div class="bottom-bar">
        <button class="save-btn" onclick="finishWorkout()">Training beenden</button>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <div style="flex: 1; padding-right: 15px;">
                    <h2 class="modal-title" id="mTitle">TITLE</h2>
                    <div class="modal-target" id="mTarget">TARGET</div>
                    <div class="modal-target" id="mHinweis" style="font-weight: 500; font-size: 13px; margin-top: 8px; margin-bottom: 12px; line-height: 1.4;">HINWEIS</div>
                    <a href="#" target="_blank" id="mLink" style="display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 800; color: #fff; background: #000; padding: 8px 14px; border-radius: 20px; text-decoration: none; text-transform: uppercase; letter-spacing: 0.5px;">▶ Video</a>
                </div>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            
            <div class="input-group">
                <label>Sätze</label>
                <input type="number" id="mSets" class="brutal-input" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>Start (kg)</label>
                <input type="number" step="0.5" id="mStart" class="brutal-input" inputmode="decimal">
            </div>
            <div class="input-group">
                <label>Heute (kg)</label>
                <input type="number" step="0.5" id="mToday" class="brutal-input" inputmode="decimal">
            </div>

            <div class="input-group" style="margin-top: 30px;">
                <label>Notizen / Geräte-Einstellung</label>
                <textarea id="mNotes" class="brutal-input" style="font-size: 16px; min-height: 40px; padding: 5px 0 10px; line-height: 1.4; resize: vertical; overflow: auto; border-bottom: 2px solid #E0E0E0;" placeholder="Sitzhöhe 4, Pad 2..."></textarea>
            </div>

            <button class="done-btn" onclick="saveActiveEx()">Fertig</button>
        </div>
    </div>

    <div id="toast">✓ Gespeichert</div>

    <script>
        const workouts = {
            ok_a: [
                { id: "oka_1", short:"BD", name: "KH-Bankdrücken", target: "3 Sätze x 8-12 Wdh", defaultSets: 3, hinweis: "Schultern fest auf der Bank.", link: "https://www.youtube.com/results?search_query=Kurzhantel+Bankdr%C3%BCcken+Ausf%C3%BChrung" },
                { id: "oka_2", short:"LZ", name: "Latzug", target: "3 Sätze x 8-12 Wdh", defaultSets: 3, hinweis: "Volle Dehnung oben mitnehmen.", link: "https://www.youtube.com/results?search_query=Latzug+Ausf%C3%BChrung" },
                { id: "oka_3", short:"FP", name: "Face-Pulls", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Zieht zur Stirn. Fokus hintere Schulter.", link: "https://www.youtube.com/results?search_query=Face+Pulls+Ausf%C3%BChrung" },
                { id: "oka_4", short:"RU", name: "Kabel-Rudern", target: "3 Sätze x 8-12 Wdh", defaultSets: 3, hinweis: "Ellenbogen nah am Körper führen.", link: "https://www.youtube.com/results?search_query=Kabelzug+Rudern+eng+Ausf%C3%BChrung" },
                { id: "oka_5", short:"TR", name: "Trizepsdrücken", target: "2 Sätze x 10-15 Wdh", defaultSets: 2, hinweis: "Oberarme fest am Körper.", link: "https://www.youtube.com/results?search_query=Trizepsdr%C3%BCcken+Kabelzug+Ausf%C3%BChrung" },
                { id: "oka_6", short:"SC", name: "Schrägbank-Curls", target: "2 Sätze x 10-15 Wdh", defaultSets: 2, hinweis: "Tiefe Dehnung im Bizeps (Arme hinter Körper).", link: "https://www.youtube.com/results?search_query=Incline+Dumbbell+Curls+Ausf%C3%BChrung" }
            ],
            uk_a: [
                { id: "uka_1", short:"BP", name: "Beinpresse", target: "3 Sätze x 8-12 Wdh", defaultSets: 3, hinweis: "Druck über Ferse. Füße mittig bis hoch.", link: "https://www.youtube.com/results?search_query=Beinpresse+Ausf%C3%BChrung" },
                { id: "uka_2", short:"RK", name: "Rum. Kreuzheben", target: "3 Sätze x 8-12 Wdh", defaultSets: 3, hinweis: "Hüfte nach hinten, tiefe Dehnung Hamstrings.", link: "https://www.youtube.com/results?search_query=Rum%C3%A4nisches+Kreuzheben+Kurzhantel+Ausf%C3%BChrung" },
                { id: "uka_3", short:"BH", name: "Beckenheben", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Knieschonender Beinstrecker-Ersatz.", link: "https://www.youtube.com/results?search_query=Hip+Thrusts+Ausf%C3%BChrung" },
                { id: "uka_4", short:"BB", name: "Beinbeuger", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Kontrollierte negative Bewegung.", link: "https://www.youtube.com/results?search_query=Beinbeuger+Maschine+Ausf%C3%BChrung" },
                { id: "uka_5", short:"WS", name: "Waden (Sitzend)", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Fokus Soleus. Unten 2 Sek. strikte Pause!", link: "https://www.youtube.com/results?search_query=Wadenheben+sitzend+Ausf%C3%BChrung" },
                { id: "uka_6", short:"CR", name: "Kabel-Crunches", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Aktives Einrollen der Wirbelsäule.", link: "https://www.youtube.com/results?search_query=Kabelzug+Crunches+Ausf%C3%BChrung" }
            ],
            ok_b: [
                { id: "okb_1", short:"BP", name: "Brustpresse", target: "3 Sätze x 8-12 Wdh", defaultSets: 3, hinweis: "Fokus Brustkontraktion.", link: "https://www.youtube.com/results?search_query=Brustpresse+Maschine+Ausf%C3%BChrung" },
                { id: "okb_2", short:"BR", name: "Brust-Rudern", target: "3 Sätze x 8-12 Wdh", defaultSets: 3, hinweis: "Entlastet unteren Rücken.", link: "https://www.youtube.com/results?search_query=Chest+Supported+Row+Ausf%C3%BChrung" },
                { id: "okb_3", short:"SB", name: "Schrägbank", target: "3 Sätze x 8-12 Wdh", defaultSets: 3, hinweis: "Bank auf max. 30 Grad.", link: "https://www.youtube.com/results?search_query=Schr%C3%A4gbankdr%C3%BCcken+Kurzhantel+Ausf%C3%BChrung" },
                { id: "okb_4", short:"SH", name: "Seitheben", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Arme leicht gebeugt (Wasserglas gießen).", link: "https://www.youtube.com/results?search_query=Seitheben+Kurzhantel+Ausf%C3%BChrung" },
                { id: "okb_5", short:"HC", name: "Hammer-Curls", target: "2 Sätze x 10-15 Wdh", defaultSets: 2, hinweis: "Fokus Brachialis. Daumen nach oben.", link: "https://www.youtube.com/results?search_query=Hammer+Curls+Ausf%C3%BChrung" },
                { id: "okb_6", short:"TÜ", name: "Trizeps ü. Kopf", target: "2 Sätze x 10-15 Wdh", defaultSets: 2, hinweis: "Genutzt für maximale Stretch-Verlängerung.", link: "https://www.youtube.com/results?search_query=Overhead+Tricep+Extension+Cable+Ausf%C3%BChrung" }
            ],
            uk_b: [
                { id: "ukb_1", short:"BP", name: "Beinpresse", target: "3 Sätze x 8-12 Wdh", defaultSets: 3, hinweis: "Füße mittig/hoch.", link: "https://www.youtube.com/results?search_query=Beinpresse+Ausf%C3%BChrung" },
                { id: "ukb_2", short:"RA", name: "Ausfallschritte", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Reverse Lunges (nach hinten). Extrem knieschonend.", link: "https://www.youtube.com/results?search_query=Reverse+Lunges+Ausf%C3%BChrung" },
                { id: "ukb_3", short:"BB", name: "Beinbeuger", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Kontrolliertes Ablassen.", link: "https://www.youtube.com/results?search_query=Beinbeuger+Maschine+Ausf%C3%BChrung" },
                { id: "ukb_4", short:"RS", name: "Rückenstrecker", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Stärkt Rumpf und unteren Rücken.", link: "https://www.youtube.com/results?search_query=Hyperextensions+Ausf%C3%BChrung" },
                { id: "ukb_5", short:"WSt", name: "Waden (Stehend)", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Fokus Gastrocnemius. Unten 2 Sek. Pause ohne Schwung!", link: "https://www.youtube.com/results?search_query=Wadenheben+stehend+Ausf%C3%BChrung" },
                { id: "ukb_6", short:"BH", name: "Beinheben", target: "3 Sätze x 10-15 Wdh", defaultSets: 3, hinweis: "Becken oben aktiv einrollen.", link: "https://www.youtube.com/results?search_query=Beinheben+h%C3%A4ngend+Ausf%C3%BChrung" }
            ]
        };

        const colors = [
            '#FF8A45', '#A29DFE', '#FF6768', 
            '#D9D2C5', '#FF7A00', '#FF3C2A', 
            '#FDE1F5', '#FFD25A', '#DDA833', 
            '#2BC47E', '#E1E1E1', '#DACFC2'
        ];

        let currentDayId = 'ok_a';
        let currentDayName = 'Oberkörper A';
        let activeExId = null;

        let workingData = {};
        let workoutHistory = [];

        function init() {
            const savedData = JSON.parse(localStorage.getItem('brutalWorkoutData')) || {};
            workingData = {...savedData};
            workoutHistory = JSON.parse(localStorage.getItem('brutalWorkoutHistory')) || [];
            selectDay('ok_a', 'Oberkörper A');
        }

        function toggleDropdown() {
            document.getElementById('dropdown').classList.toggle('show');
            document.getElementById('headerWrapper').classList.toggle('open');
        }

        function selectDay(id, name) {
            currentDayId = id;
            currentDayName = name;
            
            document.getElementById('activeDayText').innerText = name;
            document.getElementById('dropdown').classList.remove('show');
            document.getElementById('headerWrapper').classList.remove('open');
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const exercises = workouts[currentDayId];
            
            exercises.forEach((ex, index) => {
                const color = colors[index % colors.length];
                const data = workingData[ex.id] || {};
                const isFilled = data.sets || data.currentWeight;

                const item = document.createElement('div');
                item.className = 'exercise-item';
                item.innerHTML = `
                    <div class="circle" style="background-color: ${color}" onclick="openModal('${ex.id}')">
                        ${ex.short}
                    </div>
                    <div class="status-dot ${isFilled ? 'filled' : ''}" id="dot_${ex.id}"></div>
                    <div class="ex-name">${ex.name}</div>
                `;
                grid.appendChild(item);
            });
        }

        function openModal(exId) {
            activeExId = exId;
            const exInfo = workouts[currentDayId].find(e => e.id === exId);
            const data = workingData[exId] || { sets: exInfo.defaultSets, startWeight: '', currentWeight: '', notes: '' };

            // AUTOFILL FROM HISTORY
            if (!workingData[exId] && workoutHistory.length > 0) {
                for (let i = workoutHistory.length - 1; i >= 0; i--) {
                    const sessionData = workoutHistory[i].exercises;
                    if (sessionData && sessionData[exId]) {
                        data.startWeight = sessionData[exId].currentWeight || sessionData[exId].startWeight || '';
                        data.notes = sessionData[exId].notes || '';
                        data.sets = sessionData[exId].sets || exInfo.defaultSets;
                        break;
                    }
                }
            }

            document.getElementById('mTitle').innerText = exInfo.name;
            document.getElementById('mTarget').innerText = exInfo.target;
            document.getElementById('mHinweis').innerText = exInfo.hinweis || "";
            document.getElementById('mLink').href = exInfo.link || "#";
            
            document.getElementById('mSets').value = data.sets;
            document.getElementById('mStart').value = data.startWeight;
            document.getElementById('mToday').value = data.currentWeight;
            document.getElementById('mNotes').value = data.notes || "";

            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            activeExId = null;
        }

        function saveActiveEx() {
            if(!activeExId) return;

            workingData[activeExId] = {
                sets: document.getElementById('mSets').value,
                startWeight: document.getElementById('mStart').value,
                currentWeight: document.getElementById('mToday').value,
                notes: document.getElementById('mNotes').value
            };
            
            const isFilled = workingData[activeExId].sets || workingData[activeExId].currentWeight;
            const dot = document.getElementById(`dot_${activeExId}`);
            if(dot) {
                if(isFilled) dot.classList.add('filled');
                else dot.classList.remove('filled');
            }

            closeModal();
            localStorage.setItem('brutalWorkoutData', JSON.stringify(workingData));
        }

        function finishWorkout() {
            if (Object.keys(workingData).length === 0) {
                showToast("❌ Nichts eingetragen!");
                return;
            }
            
            const timestamp = new Date().toISOString();
            const session = {
                timestamp: timestamp,
                dayId: currentDayId,
                dayName: currentDayName,
                exercises: {...workingData}
            };
            
            workoutHistory.push(session);
            localStorage.setItem('brutalWorkoutHistory', JSON.stringify(workoutHistory));
            
            workingData = {};
            localStorage.removeItem('brutalWorkoutData');
            
            showToast("✓ Training im Archiv gespeichert!");
            renderGrid();
        }

        function exportHistory() {
            if (workoutHistory.length === 0) {
                showToast("Historie ist leer!");
                return;
            }
            const dataStr = JSON.stringify(workoutHistory, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            const dateStr = new Date().toISOString().split('T')[0];
            a.download = `fitness_historie_${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            document.getElementById('dropdown').classList.remove('show');
            document.getElementById('headerWrapper').classList.remove('open');
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            if (msg) toast.innerText = msg;
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 2500);
            if(navigator.vibrate) navigator.vibrate(50);
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#headerWrapper')) {
                document.getElementById('dropdown').classList.remove('show');
                document.getElementById('headerWrapper').classList.remove('open');
            }
            if (e.target.id === 'modalOverlay') {
                closeModal();
            }
        });

        window.onload = init;
    </script>
</body>
</html>
