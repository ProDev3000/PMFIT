<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Training">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Training</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #F0F0F0;
            --text-dark: #000000;
            --text-light: #A0A0A0;
            --modal-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: calc(30px + env(safe-area-inset-top)) 20px 140px 20px;
            overscroll-behavior-y: none;
        }

        /* HEADER */
        .header {
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .main-title {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            line-height: 1;
        }

        .arrow {
            font-size: 20px;
            font-weight: 700;
            transform: translateY(2px);
            transition: transform 0.2s;
        }

        .header.open .arrow {
            transform: translateY(2px) rotate(180deg);
        }

        .sub-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-light);
            margin: 0;
            letter-spacing: -1px;
            line-height: 1;
        }

        /* DROPDOWN */
        .dropdown {
            position: absolute;
            top: 80px;
            left: -10px;
            background: #fff;
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            z-index: 20;
            min-width: 240px;
        }

        .dropdown.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 15px 20px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background: var(--bg);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 15px;
            margin-top: 20px;
        }

        .exercise-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .circle {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: 900;
            color: #000;
            cursor: pointer;
            transition: transform 0.15s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .circle:active {
            transform: scale(0.9);
        }

        .ex-name {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
            max-width: 100px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-light);
            margin-top: -4px;
            transition: background 0.2s;
        }
        
        .status-dot.filled {
            background: #000;
        }

        /* BOTTOM BAR */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            padding-bottom: calc(30px + env(safe-area-inset-bottom));
            background: transparent;
            display: flex;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        .save-btn {
            pointer-events: auto;
            width: 100%;
            max-width: 340px;
            height: 60px;
            border-radius: 14px;
            background: #000;
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, background 0.2s;
            text-transform: uppercase;
        }

        .save-btn:active {
            transform: scale(0.98);
            background: #222;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--modal-bg);
            width: 100%;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 30px 20px 50px 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .modal-target {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-light);
            margin-top: 5px;
        }

        .close-btn {
            background: #f0f0f0;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 800;
            color: var(--text-light);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .brutal-input {
            width: 100%;
            border: none;
            border-bottom: 4px solid #E0E0E0;
            background: transparent;
            font-size: 40px;
            font-weight: 900;
            color: #000;
            padding: 5px 0;
            border-radius: 0;
            appearance: textfield;
            transition: border-color 0.2s;
        }

        .brutal-input:focus {
            outline: none;
            border-color: #000;
        }
        
        .brutal-input::-webkit-outer-spin-button,
        .brutal-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .done-btn {
            width: 100%;
            background: #000;
            color: #fff;
            border: none;
            padding: 20px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 12px;
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s;
        }
        .done-btn:active {
            transform: scale(0.98);
        }

        /* SET TRACKING */
        .set-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 25px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 54px 1fr 1fr;
            gap: 14px;
            align-items: end;
        }

        .set-number {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 2px;
        }

        .set-field label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-light);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .set-field .brutal-input {
            font-size: 30px;
            border-bottom-width: 3px;
        }

        .progress-hint {
            background: #F0F0F0;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.35;
            margin: -5px 0 28px;
        }

        /* HISTORY CHART */
        .history-chart-card {
            display: none;
            background: #F0F0F0;
            border-radius: 18px;
            padding: 16px;
            margin: -8px 0 28px;
        }

        .history-chart-title {
            font-size: 12px;
            font-weight: 900;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .history-chart {
            width: 100%;
            min-height: 145px;
        }

        .history-chart svg {
            display: block;
            width: 100%;
            height: auto;
            overflow: visible;
        }

        .history-chart-detail {
            min-height: 34px;
            margin-top: 8px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.4;
            color: #555;
        }

        .history-chart-point {
            cursor: pointer;
        }

        .file-input {
            display: none;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: calc(110px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(200px);
            background: #000;
            color: #fff;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

    </style>
</head>
<body>

    <div class="header" id="headerWrapper">
        <h1 class="main-title" onclick="toggleDropdown()">
            <span id="activeDayText">Laden...</span>
            <span class="arrow">▼</span>
        </h1>
        <h2 class="sub-title">Workout</h2>

        <div class="dropdown" id="dropdown">
            <div class="dropdown-item" onclick="selectDay('ok_a', 'Oberkörper A')">Oberkörper A</div>
            <div class="dropdown-item" onclick="selectDay('uk_a', 'Unterkörper A')">Unterkörper A</div>
            <div class="dropdown-item" onclick="selectDay('ok_b', 'Oberkörper B')">Oberkörper B</div>
            <div class="dropdown-item" onclick="selectDay('uk_b', 'Unterkörper B')">Unterkörper B</div>
            <div style="height: 1px; background: #EEE; margin: 5px 15px;"></div>
            <div class="dropdown-item" onclick="exportHistory()" style="color: #2BC47E;">Historie exportieren</div>
            <div class="dropdown-item" onclick="exportFullBackup()" style="color: #2BC47E;">Backup exportieren</div>
            <div class="dropdown-item" onclick="triggerImport()">Backup importieren</div>
        </div>
    </div>

    <input class="file-input" type="file" id="backupImportInput" accept=".json,application/json" onchange="importBackup(event)">

    <div class="grid" id="grid">
        <!-- Circles will be rendered here -->
    </div>

    <div class="bottom-bar">
        <button class="save-btn" id="autoStatusBtn" onclick="showAutoSaveInfo()">Bereit</button>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <div style="flex: 1; padding-right: 15px;">
                    <h2 class="modal-title" id="mTitle">TITLE</h2>
                    <div class="modal-target" id="mTarget">TARGET</div>
                    <div id="mLastWorkoutText" style="display: none; font-size: 12px; font-weight: 700; color: #888; margin-top: 4px;">Zuvor: --</div>
                    <div class="modal-target" id="mHinweis" style="font-weight: 500; font-size: 13px; margin-top: 8px; margin-bottom: 12px; line-height: 1.4;">HINWEIS</div>
                    <a href="#" target="_blank" id="mLink" style="display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 800; color: #fff; background: #000; padding: 8px 14px; border-radius: 20px; text-decoration: none; text-transform: uppercase; letter-spacing: 0.5px;">▶ Video</a>
                </div>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>

            <div class="history-chart-card" id="historyChartCard">
                <div class="history-chart-title">Gewichtsverlauf</div>
                <div class="history-chart" id="historyChart"></div>
                <div class="history-chart-detail" id="historyChartDetail"></div>
            </div>
            
            <div class="input-group">
                <label>Sätze</label>
                <input type="number" min="1" max="8" id="mSets" class="brutal-input" inputmode="numeric" oninput="handleSetCountChange()">
            </div>

            <div class="set-list" id="setRows"></div>
            <div class="progress-hint" id="mProgressHint">Wiederholungen eintragen für eine Empfehlung.</div>

            <div class="input-group" style="margin-top: 30px;">
                <label>Notizen / Geräte-Einstellung</label>
                <textarea id="mNotes" class="brutal-input" style="font-size: 16px; min-height: 40px; padding: 5px 0 10px; line-height: 1.4; resize: vertical; overflow: auto; border-bottom: 2px solid #E0E0E0;" placeholder="Sitzhöhe 4, Pad 2..."></textarea>
            </div>

            <button class="done-btn" onclick="saveActiveEx()">Fertig</button>
        </div>
    </div>

    <div id="toast">✓ Gespeichert</div>

    <script>

                { id: "okb_6", short:"TÜ", name: "Trizeps ü. Kopf", target: "2 Sätze x 10-15 Wdh", defaultSets: 2, hinweis: "Genutzt für maximale Stretch-Verlängerung.", link: "https://www.youtube.com/results?search_query=Overhead+Tricep+Extension+Cable+Ausf%C3%BChrung" }

        const colors = [
            '#FF8A45', '#A29DFE', '#FF6768', 
            '#D9D2C5', '#FF7A00', '#FF3C2A',

        const STORAGE_KEYS = {
            history: 'brutalWorkoutHistory',
            legacyDraft: 'brutalWorkoutData',
            drafts: 'brutalWorkoutDraftsV2',
            selectedDay: 'brutalWorkoutSelectedDayV2',
            migrationDone: 'brutalWorkoutMigrationV2Done',
            preUpgradeBackup: 'brutalWorkoutPreUpgradeBackupV2'
        };

        const dayNames = {
            ok_a: 'Oberkörper A',
            uk_a: 'Unterkörper A',
            ok_b: 'Oberkörper B',
            uk_b: 'Unterkörper B'
        };

        let currentDayId = 'ok_a';
        let currentDayName = dayNames.ok_a;
        let activeExId = null;
        let activeSetData = [];
        let activeChartPoints = [];
        let drafts = {};
        let workoutHistory = [];
        let toastTimer = null;

        function safeParse(value, fallback) {
            if (!value) return fallback;
            try {
                return JSON.parse(value);
            } catch (error) {
                return fallback;
            }
        }

        function deepCopy(value) {
            return JSON.parse(JSON.stringify(value));
        }

        function localDateKey(date = new Date()) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function closeDropdown() {
            document.getElementById('dropdown').classList.remove('show');
            document.getElementById('headerWrapper').classList.remove('open');
        }

        function createAutomaticStorageBackup() {
            if (localStorage.getItem(STORAGE_KEYS.preUpgradeBackup)) return;

            const snapshot = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('brutalWorkout')) {
                    snapshot[key] = localStorage.getItem(key);
                }
            }

            localStorage.setItem(STORAGE_KEYS.preUpgradeBackup, JSON.stringify({
                createdAt: new Date().toISOString(),
                snapshot
            }));
        }

        function getExerciseInfo(exId) {
            for (const exercises of Object.values(workouts)) {
                const exercise = exercises.find(item => item.id === exId);
                if (exercise) return exercise;
            }
            return null;
        }

        function getDayIdForExercise(exId) {
            if (exId.startsWith('oka_')) return 'ok_a';
            if (exId.startsWith('uka_')) return 'uk_a';
            if (exId.startsWith('okb_')) return 'ok_b';
            if (exId.startsWith('ukb_')) return 'uk_b';
            return null;
        }

        function clampSetCount(value, fallback = 3) {
            const parsed = Number.parseInt(value, 10);
            if (!Number.isFinite(parsed)) return fallback;
            return Math.min(8, Math.max(1, parsed));
        }

        function firstFilled(...values) {
            return values.find(value => value !== undefined && value !== null && String(value) !== '') ?? '';
        }

        function normalizeExerciseData(rawData, exerciseInfo) {
            const raw = rawData || {};
            const setCount = clampSetCount(raw.sets, exerciseInfo?.defaultSets || 3);
            let setData = [];

            if (Array.isArray(raw.setData)) {
                setData = raw.setData.map(set => ({
                    weight: String(set?.weight ?? ''),
                    reps: String(set?.reps ?? '')
                }));
            } else {
                const previousWeight = firstFilled(raw.currentWeight, raw.startWeight);
                setData = Array.from({ length: setCount }, () => ({
                    weight: String(previousWeight),
                    reps: ''
                }));
            }

            while (setData.length < setCount) {
                const previousWeight = setData.at(-1)?.weight || '';
                setData.push({ weight: previousWeight, reps: '' });
            }

            return {
                sets: String(setCount),
                setData: setData.slice(0, setCount),
                startWeight: String(raw.startWeight ?? ''),
                currentWeight: String(raw.currentWeight ?? ''),
                notes: String(raw.notes ?? ''),
                dataVersion: raw.dataVersion || 1
            };
        }

        function ensureDraft(dayId) {
            if (!drafts[dayId]) {
                const now = new Date();
                drafts[dayId] = {
                    dayId,
                    dayName: dayNames[dayId],
                    dateKey: localDateKey(now),
                    startedAt: now.toISOString(),
                    lastUpdatedAt: now.toISOString(),
                    exercises: {}
                };
            }
            return drafts[dayId];
        }

        function saveDrafts() {
            localStorage.setItem(STORAGE_KEYS.drafts, JSON.stringify(drafts));
        }

        function saveHistory() {
            localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(workoutHistory));
        }

        function migrateLegacyDraft() {
            if (localStorage.getItem(STORAGE_KEYS.migrationDone)) return;

            const legacyData = safeParse(localStorage.getItem(STORAGE_KEYS.legacyDraft), {});
            const now = new Date();

            Object.entries(legacyData).forEach(([exId, rawData]) => {
                const dayId = getDayIdForExercise(exId);
                const exerciseInfo = getExerciseInfo(exId);
                if (!dayId || !exerciseInfo) return;

                const draft = ensureDraft(dayId);
                if (!draft.exercises[exId]) {
                    draft.exercises[exId] = normalizeExerciseData(rawData, exerciseInfo);
                    draft.lastUpdatedAt = now.toISOString();
                }
            });

            saveDrafts();
            localStorage.setItem(STORAGE_KEYS.migrationDone, new Date().toISOString());
        }

        function hasDraftEntries(dayId) {
            return Boolean(drafts[dayId] && Object.keys(drafts[dayId].exercises || {}).length);
        }

        function finalizeDraft(dayId, reason) {
            const draft = drafts[dayId];
            if (!draft || !Object.keys(draft.exercises || {}).length) return false;

            workoutHistory.push({
                timestamp: draft.lastUpdatedAt || new Date().toISOString(),
                dayId,
                dayName: draft.dayName || dayNames[dayId],
                exercises: deepCopy(draft.exercises),
                autoCompleted: true,
                completionReason: reason,
                autoCompletedAt: new Date().toISOString()
            });

            delete drafts[dayId];
            saveHistory();
            saveDrafts();
            return true;
        }

        function autoFinalizeStaleDrafts() {
            const today = localDateKey();
            let completed = 0;

            Object.keys(drafts).forEach(dayId => {
                const draft = drafts[dayId];
                if (draft?.dateKey && draft.dateKey < today && finalizeDraft(dayId, 'new-day')) {
                    completed++;
                }
            });

            return completed;
        }

        function init() {
            createAutomaticStorageBackup();
            workoutHistory = safeParse(localStorage.getItem(STORAGE_KEYS.history), []);
            if (!Array.isArray(workoutHistory)) workoutHistory = [];

            drafts = safeParse(localStorage.getItem(STORAGE_KEYS.drafts), {});
            if (!drafts || Array.isArray(drafts) || typeof drafts !== 'object') drafts = {};

            migrateLegacyDraft();
            const completed = autoFinalizeStaleDrafts();

            const savedDay = localStorage.getItem(STORAGE_KEYS.selectedDay);
            currentDayId = workouts[savedDay] ? savedDay : 'ok_a';
            currentDayName = dayNames[currentDayId];
            selectDay(currentDayId, currentDayName, { skipFinalize: true });

            if (completed > 0) {
                showToast(`✓ ${completed} Training${completed > 1 ? 's' : ''} automatisch gespeichert`);
            }
        }

        function toggleDropdown() {
            document.getElementById('dropdown').classList.toggle('show');
            document.getElementById('headerWrapper').classList.toggle('open');
        }

        function selectDay(id, name, options = {}) {
            if (!options.skipFinalize && currentDayId && currentDayId !== id && hasDraftEntries(currentDayId)) {
                const previousName = dayNames[currentDayId];
                finalizeDraft(currentDayId, 'workout-switch');
                showToast(`✓ ${previousName} gespeichert`);
            }

            currentDayId = id;
            currentDayName = name;
            localStorage.setItem(STORAGE_KEYS.selectedDay, id);

            document.getElementById('activeDayText').innerText = name;
            closeDropdown();
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const exercises = workouts[currentDayId];
            const currentExercises = drafts[currentDayId]?.exercises || {};

            exercises.forEach((ex, index) => {
                const color = colors[index % colors.length];
                const isFilled = Boolean(currentExercises[ex.id]);

                const item = document.createElement('div');
                item.className = 'exercise-item';
                item.innerHTML = `
                    <div class="circle" style="background-color: ${color}" onclick="openModal('${ex.id}')">
                        ${ex.short}
                    </div>
                    <div class="status-dot ${isFilled ? 'filled' : ''}" id="dot_${ex.id}"></div>
                    <div class="ex-name">${ex.name}</div>
                `;
                grid.appendChild(item);
            });

            updateAutoStatus();
        }

        function findLastExercise(exId) {
            for (let i = workoutHistory.length - 1; i >= 0; i--) {
                const exerciseData = workoutHistory[i]?.exercises?.[exId];
                if (exerciseData) {
                    return {
                        timestamp: workoutHistory[i].timestamp,
                        data: exerciseData
                    };
                }
            }
            return null;
        }

        function representativeWeight(data) {
            if (Array.isArray(data?.setData)) {
                const weights = data.setData
                    .map(set => Number(set?.weight))
                    .filter(weight => Number.isFinite(weight) && weight > 0);
                if (weights.length) return Math.max(...weights);
            }

            const legacyWeight = Number(firstFilled(data?.currentWeight, data?.startWeight));
            return Number.isFinite(legacyWeight) && legacyWeight > 0 ? legacyWeight : null;
        }

        function repsSummary(data) {
            if (!Array.isArray(data?.setData)) return '';
            const reps = data.setData.map(set => String(set?.reps ?? '')).filter(Boolean);
            return reps.length ? reps.join('/') : '';
        }

        function lastPerformanceText(last) {
            if (!last) return null;
            const weight = representativeWeight(last.data);
            const reps = repsSummary(last.data);
            const setCount = last.data?.sets;
            const date = new Date(last.timestamp).toLocaleDateString('de-DE', {
                day: '2-digit',
                month: '2-digit'
            });

            const performance = [
                weight ? `${weight} kg` : null,
                reps ? `${reps} Wdh` : (setCount ? `${setCount} Sätze` : null)
            ].filter(Boolean).join(' • ');

            return performance ? `${performance} (am ${date})` : null;
        }

        function openModal(exId) {
            activeExId = exId;
            const exInfo = workouts[currentDayId].find(exercise => exercise.id === exId);
            const savedToday = drafts[currentDayId]?.exercises?.[exId];
            const last = findLastExercise(exId);
            let data;

            if (savedToday) {
                data = normalizeExerciseData(savedToday, exInfo);
            } else if (last) {
                const previous = normalizeExerciseData(last.data, exInfo);
                data = {
                    sets: previous.sets,
                    setData: previous.setData.map(set => ({
                        weight: set.weight,
                        reps: ''
                    })),
                    startWeight: previous.currentWeight || previous.startWeight,
                    currentWeight: '',
                    notes: last.data.notes || '',
                    dataVersion: 2
                };
            } else {
                data = normalizeExerciseData({ sets: exInfo.defaultSets }, exInfo);
            }

            const previousText = lastPerformanceText(last);
            const lastTextEl = document.getElementById('mLastWorkoutText');
            if (previousText) {
                lastTextEl.style.display = 'block';
                lastTextEl.innerText = '↻ Zuletzt: ' + previousText;
            } else {
                lastTextEl.style.display = 'none';
            }

            document.getElementById('mTitle').innerText = exInfo.name;
            document.getElementById('mTarget').innerText = exInfo.target;
            document.getElementById('mHinweis').innerText = exInfo.hinweis || '';
            document.getElementById('mLink').href = exInfo.link || '#';
            document.getElementById('mSets').value = data.sets;
            document.getElementById('mNotes').value = data.notes || '';

            activeSetData = data.setData;
            renderSetRows();
            renderHistoryChart(exId);
            updateProgressHint();
            document.querySelector('.modal-content').scrollTop = 0;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            activeExId = null;
            activeSetData = [];
            activeChartPoints = [];
        }

        function escapeAttribute(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('"', '&quot;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;');
        }

        function collectSetRows() {
            const count = clampSetCount(document.getElementById('mSets').value);
            return Array.from({ length: count }, (_, index) => ({
                weight: document.getElementById(`mWeight_${index}`)?.value || '',
                reps: document.getElementById(`mReps_${index}`)?.value || ''
            }));
        }

        function renderSetRows() {
            const count = clampSetCount(document.getElementById('mSets').value);
            const rows = document.getElementById('setRows');
            rows.innerHTML = '';

            for (let index = 0; index < count; index++) {
                const set = activeSetData[index] || {
                    weight: activeSetData.at(-1)?.weight || '',
                    reps: ''
                };

                const row = document.createElement('div');
                row.className = 'set-row';
                row.innerHTML = `
                    <div class="set-number">${index + 1}</div>
                    <div class="set-field">
                        <label>KG</label>
                        <input type="number" step="0.5" id="mWeight_${index}" class="brutal-input" inputmode="decimal" value="${escapeAttribute(set.weight)}" oninput="updateProgressHint()">
                    </div>
                    <div class="set-field">
                        <label>Wdh</label>
                        <input type="number" min="0" id="mReps_${index}" class="brutal-input" inputmode="numeric" value="${escapeAttribute(set.reps)}" oninput="updateProgressHint()">
                    </div>
                `;
                rows.appendChild(row);
            }
        }

        function handleSetCountChange() {
            activeSetData = collectSetRows();
            const count = clampSetCount(document.getElementById('mSets').value);
            document.getElementById('mSets').value = count;
            renderSetRows();
            updateProgressHint();
        }

        function updateProgressHint() {
            const hint = document.getElementById('mProgressHint');
            if (!activeExId) return;

            const rows = collectSetRows();
            const reps = rows.map(set => Number(set.reps));
            const allEntered = reps.length > 0 && reps.every(value => Number.isFinite(value) && value > 0);

            if (!allEntered) {
                hint.innerText = 'Wiederholungen eintragen für eine Empfehlung.';
            } else if (reps.every(value => value >= 10)) {
                hint.innerText = '✓ Nächstes Mal Gewicht leicht erhöhen.';
            } else if (reps.some(value => value < 8)) {
                hint.innerText = 'Gewicht halten oder leicht reduzieren.';
            } else {
                hint.innerText = 'Gewicht beim nächsten Mal beibehalten.';
            }
        }

        function saveActiveEx() {
            if (!activeExId) return;

            const now = new Date();
            const setData = collectSetRows();
            const weights = setData
                .filter(set => set.weight !== '')
                .map(set => Number(set.weight))
                .filter(Number.isFinite);
            const draft = ensureDraft(currentDayId);

            draft.dateKey = draft.dateKey || localDateKey(now);
            draft.lastUpdatedAt = now.toISOString();
            draft.exercises[activeExId] = {
                sets: String(setData.length),
                setData,
                startWeight: setData.find(set => set.weight)?.weight || '',
                currentWeight: weights.length ? String(Math.max(...weights)) : '',
                notes: document.getElementById('mNotes').value,
                dataVersion: 2
            };

            saveDrafts();
            const completedAfterMidnight = draft.dateKey < localDateKey(now)
                ? finalizeDraft(currentDayId, 'new-day')
                : false;
            closeModal();
            renderGrid();
            if (completedAfterMidnight) {
                showToast(`✓ ${currentDayName} automatisch gespeichert`);
            }
        }

        function historyPointsForExercise(exId) {
            return workoutHistory.map(session => {
                const data = session?.exercises?.[exId];
                const weight = representativeWeight(data);
                if (!data || !weight) return null;

                return {
                    timestamp: session.timestamp,
                    weight,
                    reps: repsSummary(data),
                    notes: data.notes || ''
                };
            }).filter(Boolean).slice(-16);
        }

        function renderHistoryChart(exId) {
            const card = document.getElementById('historyChartCard');
            const chart = document.getElementById('historyChart');
            activeChartPoints = historyPointsForExercise(exId);

            if (!activeChartPoints.length) {
                card.style.display = 'none';
                chart.innerHTML = '';
                return;
            }

            card.style.display = 'block';
            const width = 320;
            const height = 145;
            const left = 32;
            const right = 10;
            const top = 14;
            const bottom = 28;
            const values = activeChartPoints.map(point => point.weight);
            const rawMin = Math.min(...values);
            const rawMax = Math.max(...values);
            const minValue = rawMin === rawMax ? Math.max(0, rawMin - 1) : rawMin;
            const maxValue = rawMin === rawMax ? rawMax + 1 : rawMax;
            const times = activeChartPoints.map(point => new Date(point.timestamp).getTime());
            const minTime = Math.min(...times);
            const maxTime = Math.max(...times);

            const xFor = (time, index) => {
                if (maxTime === minTime) {
                    return activeChartPoints.length === 1
                        ? (left + width - right) / 2
                        : left + (index / (activeChartPoints.length - 1)) * (width - left - right);
                }
                return left + ((time - minTime) / (maxTime - minTime)) * (width - left - right);
            };

            const yFor = value => top + ((maxValue - value) / (maxValue - minValue)) * (height - top - bottom);
            const coordinates = activeChartPoints.map((point, index) => ({
                x: xFor(times[index], index),
                y: yFor(point.weight)
            }));
            const polyline = coordinates.map(point => `${point.x},${point.y}`).join(' ');
            const firstDate = new Date(activeChartPoints[0].timestamp).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
            const lastDate = new Date(activeChartPoints.at(-1).timestamp).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });

            chart.innerHTML = `
                <svg viewBox="0 0 ${width} ${height}" aria-label="Gewichtsverlauf">
                    <line x1="${left}" y1="${top}" x2="${left}" y2="${height - bottom}" stroke="#D0D0D0" stroke-width="1"/>
                    <line x1="${left}" y1="${height - bottom}" x2="${width - right}" y2="${height - bottom}" stroke="#D0D0D0" stroke-width="1"/>
                    <text x="0" y="${top + 4}" font-size="10" font-weight="700" fill="#888">${rawMax}kg</text>
                    <text x="0" y="${height - bottom + 4}" font-size="10" font-weight="700" fill="#888">${rawMin}kg</text>
                    ${coordinates.length > 1 ? `<polyline points="${polyline}" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
                    ${coordinates.map((point, index) => `
                        <circle class="history-chart-point" cx="${point.x}" cy="${point.y}" r="5" fill="${colors[index % colors.length]}" stroke="#000" stroke-width="2" onclick="showChartPoint(${index})"/>
                    `).join('')}
                    <text x="${left}" y="${height - 7}" font-size="10" font-weight="700" fill="#888">${firstDate}</text>
                    <text x="${width - right}" y="${height - 7}" text-anchor="end" font-size="10" font-weight="700" fill="#888">${lastDate}</text>
                </svg>
            `;

            showChartPoint(activeChartPoints.length - 1);
        }

        function showChartPoint(index) {
            const point = activeChartPoints[index];
            if (!point) return;

            const date = new Date(point.timestamp).toLocaleDateString('de-DE', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
            const parts = [`${date}: ${point.weight} kg`];
            if (point.reps) parts.push(`${point.reps} Wdh`);
            if (point.notes) parts.push(point.notes);
            document.getElementById('historyChartDetail').innerText = parts.join(' • ');
        }

        function updateAutoStatus() {
            const button = document.getElementById('autoStatusBtn');
            const count = Object.keys(drafts[currentDayId]?.exercises || {}).length;
            button.innerText = count > 0
                ? `Auto-Speichern • ${count}/${workouts[currentDayId].length}`
                : 'Bereit • Auto-Speichern';
        }

        function showAutoSaveInfo() {
            showToast(hasDraftEntries(currentDayId)
                ? 'Training wird beim Planwechsel oder am nächsten Tag abgeschlossen.'
                : 'Startet automatisch mit dem ersten gespeicherten Eintrag.');
        }

        function downloadJson(filename, data) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function exportHistory() {
            if (workoutHistory.length === 0) {
                showToast('Historie ist leer!');
                return;
            }

            downloadJson(`fitness_historie_${localDateKey()}.json`, workoutHistory);
            closeDropdown();
        }

        function exportFullBackup() {
            const backup = {
                format: 'brutal-workout-backup',
                version: 2,
                exportedAt: new Date().toISOString(),
                history: workoutHistory,
                drafts,
                selectedDay: currentDayId,
                legacyWorkingData: safeParse(localStorage.getItem(STORAGE_KEYS.legacyDraft), {}),
                preUpgradeBackup: safeParse(localStorage.getItem(STORAGE_KEYS.preUpgradeBackup), null)
            };

            downloadJson(`fitness_backup_${localDateKey()}.json`, backup);
            closeDropdown();
            showToast('✓ Vollständiges Backup exportiert');
        }

        function triggerImport() {
            closeDropdown();
            const input = document.getElementById('backupImportInput');
            input.value = '';
            input.click();
        }

        function saveEmergencyBackupBeforeImport() {
            localStorage.setItem(`brutalWorkoutBeforeImport_${Date.now()}`, JSON.stringify({
                createdAt: new Date().toISOString(),
                history: workoutHistory,
                drafts,
                selectedDay: currentDayId
            }));
        }

        function importBackup(event) {
            const file = event.target.files?.[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const imported = JSON.parse(reader.result);
                    const isLegacyHistory = Array.isArray(imported);
                    const isFullBackup = imported?.format === 'brutal-workout-backup' && Array.isArray(imported.history);

                    if (!isLegacyHistory && !isFullBackup) {
                        showToast('❌ Backup-Format nicht erkannt');
                        return;
                    }

                    const question = isLegacyHistory
                        ? 'Diese Historie importieren und die aktuelle Historie ersetzen?'
                        : 'Dieses Backup importieren und die aktuellen lokalen Trainingsdaten ersetzen?';
                    if (!window.confirm(question)) return;

                    saveEmergencyBackupBeforeImport();

                    if (isLegacyHistory) {
                        workoutHistory = imported;
                        saveHistory();
                    } else {
                        workoutHistory = imported.history;
                        drafts = imported.drafts && typeof imported.drafts === 'object' ? imported.drafts : {};
                        currentDayId = workouts[imported.selectedDay] ? imported.selectedDay : 'ok_a';
                        saveHistory();
                        saveDrafts();
                        localStorage.setItem(STORAGE_KEYS.selectedDay, currentDayId);
                    }

                    window.location.reload();
                } catch (error) {
                    showToast('❌ Backup konnte nicht gelesen werden');
                }
            };
            reader.readAsText(file);
        }

        function handleResume() {
            if (document.getElementById('modalOverlay').classList.contains('show')) return;
            const completed = autoFinalizeStaleDrafts();
            if (completed > 0) {
                renderGrid();
                showToast(`✓ ${completed} Training${completed > 1 ? 's' : ''} automatisch gespeichert`);
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (msg) toast.innerText = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
            if (navigator.vibrate) navigator.vibrate(50);
        }

        document.addEventListener('click', event => {
            if (!event.target.closest('#headerWrapper')) {
                closeDropdown();
            }
            if (event.target.id === 'modalOverlay') {
                closeModal();
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') handleResume();
        });
        window.addEventListener('focus', handleResume);
        window.onload = init;
    </script>
</body>
